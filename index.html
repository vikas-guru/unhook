    <!-- ============================================================
         Pre-mount layer (owned by the integration pass, not a feature
         module). Two jobs, both before Vue/Tailwind have loaded:
           1. A branded splash so first paint is never a blank canvas.
           2. A custom cursor, mouse-only, in the Nightfall palette.
         Uses ONLY design-system tokens so it's seamless with the app.
         ============================================================ -->
    <style>
      :root {
        --pb-bg: #13160f;
        --pb-bg2: #0e110a;
        --pb-ink: #ece7db;
        --pb-muted: #9aa393;
        --pb-accent: #e0785a;
        --pb-accent2: #5fb27f;
      }

      /* ---------- Pre-mount splash ---------- */
      #preboot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(1000px 560px at 84% -12%, rgba(224, 120, 90, 0.16), transparent 60%),
          radial-gradient(860px 520px at -8% 110%, rgba(95, 178, 127, 0.13), transparent 56%),
          var(--pb-bg);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #preboot.pb-out { opacity: 0; visibility: hidden; }

      .pb-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        transform: translateY(-2%);
      }

      .pb-orbit { position: relative; display: grid; place-items: center; width: 92px; height: 92px; }
      .pb-ring {
        position: absolute;
        border-radius: 999px;
        width: 76px; height: 76px;
        animation: pb-breathe 3.4s ease-in-out infinite;
      }
      .pb-ring-a { background: rgba(224, 120, 90, 0.38); }
      .pb-ring-b { background: rgba(95, 178, 127, 0.28); animation-delay: 1.1s; }
      .pb-core {
        position: relative;
        display: grid;
        place-items: center;
        width: 62px; height: 62px;
        border-radius: 999px;
        background: var(--pb-bg2);
        border: 1px solid rgba(240, 236, 225, 0.08);
        box-shadow: 0 2px 6px rgba(0,0,0,.35), 0 26px 52px -22px rgba(0,0,0,.8);
        font-size: 26px;
        line-height: 1;
      }

      .pb-word {
        margin: 0;
        font-family: "Fraunces", ui-serif, Georgia, serif;
        font-weight: 600;
        font-size: 30px;
        letter-spacing: -0.01em;
        color: var(--pb-ink);
      }
      .pb-word b { color: var(--pb-accent); font-weight: 600; }
      .pb-sub {
        margin: -8px 0 0;
        font-family: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: 13px;
        color: var(--pb-muted);
        letter-spacing: 0.01em;
      }

      .pb-bar {
        margin-top: 6px;
        width: 168px; height: 3px;
        border-radius: 999px;
        background: rgba(240, 236, 225, 0.08);
        overflow: hidden;
      }
      .pb-bar > i {
        display: block; height: 100%; width: 42%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, var(--pb-accent), var(--pb-accent2), transparent);
        animation: pb-slide 1.25s cubic-bezier(.4,0,.2,1) infinite;
      }

      @keyframes pb-breathe { 0%,100% { transform: scale(1); opacity:.55; } 50% { transform: scale(1.28); opacity:.12; } }
      @keyframes pb-slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(360%); } }

      @media (prefers-reduced-motion: reduce) {
        .pb-ring, .pb-bar > i { animation: none; }
        .pb-ring-a { opacity: .3; }
        .pb-ring-b { opacity: .22; }
      }

      /* ---------- Custom cursor (mouse only) ----------
         Ring-dot at rest, terracotta "action" ring on anything clickable,
         a real text caret in fields. !important is intentional so it wins
         over the design-system's .btn{cursor:pointer} without editing it. */
      @media (pointer: fine) {
        html, body, body * {
          cursor:
            url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='24'%20height='24'%3E%3Ccircle%20cx='12'%20cy='12'%20r='8'%20fill='none'%20stroke='rgb(224,120,90)'%20stroke-width='1.6'%20opacity='0.9'/%3E%3Ccircle%20cx='12'%20cy='12'%20r='2.4'%20fill='rgb(236,231,219)'/%3E%3C/svg%3E") 12 12,
            auto !important;
        }
        a, button, summary, select, label[for], [role="button"], .btn, .chip,
        .habit-card, .soft-control, .habit-control, [onclick] {
          cursor:
            url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='30'%20height='30'%3E%3Ccircle%20cx='15'%20cy='15'%20r='11'%20fill='none'%20stroke='rgb(224,120,90)'%20stroke-width='1.5'%20opacity='0.55'/%3E%3Ccircle%20cx='15'%20cy='15'%20r='6'%20fill='rgb(224,120,90)'/%3E%3Ccircle%20cx='15'%20cy='15'%20r='2.2'%20fill='rgb(19,22,15)'/%3E%3C/svg%3E") 15 15,
            pointer !important;
        }
        input:not([type="button"]):not([type="submit"]):not([type="checkbox"]):not([type="radio"]):not([type="range"]),
        textarea, [contenteditable="true"] {
          cursor: text !important;
        }
        :disabled, [aria-disabled="true"] { cursor: not-allowed !important; }
      }

      /* ============================================================
         Homepage + header motion layer (integration pass, global).
         Enhances Codex's existing classes without editing App.vue or
         style.css. Entrances animate the `translate` property (never
         `transform`) so the design system's transform-based hovers
         keep working — the two compose instead of colliding.
         ============================================================ */
      @keyframes hp-rise   { from { opacity: 0; translate: 0 16px; }  to { opacity: 1; translate: 0 0; } }
      @keyframes hp-slide  { from { opacity: 0; translate: 26px 0; }  to { opacity: 1; translate: 0 0; } }
      @keyframes hp-drop   { from { opacity: 0; translate: 0 -14px; } to { opacity: 1; translate: 0 0; } }
      @keyframes hp-sheen  { 0% { background-position: 120% 0; } 100% { background-position: -120% 0; } }
      @keyframes hp-shine  { 0%, 58% { left: -70%; } 84%, 100% { left: 130%; } }

      /* ---- Header: slides in, gains an end-to-end living accent line ---- */
      header { animation: hp-drop 0.7s cubic-bezier(.22,.61,.36,1) both; }
      header::after {
        content: "";
        position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
        pointer-events: none; opacity: 0.7;
        background: linear-gradient(90deg, transparent, rgba(224,120,90,.75), rgba(95,178,127,.55), transparent);
        background-size: 220% 100%;
        animation: hp-sheen 7s linear infinite;
      }

      /* ---- Header nav: one calm, cohesive control cluster ------------------
         Element selectors (0,1,1) win over Tailwind utility classes (0,1,0),
         so sizing/spacing normalize without touching App.vue's markup.
         Hover animates `translate` so it composes with any design-system
         transform hover instead of overriding it. */
      header .chip,
      header .btn {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        border-radius: 999px;
        line-height: 1;
        transition: background-color 0.22s var(--ease), border-color 0.22s var(--ease),
                    color 0.22s var(--ease), translate 0.22s var(--ease), box-shadow 0.22s var(--ease);
      }
      header .chip:hover {
        border-color: rgba(224, 120, 90, 0.45);
        background: rgba(224, 120, 90, 0.09);
        color: var(--ink);
        translate: 0 -1px;
      }
      header .btn-primary:hover { translate: 0 -1px; }
      /* Clear, accessible focus ring for every nav control. */
      header .chip:focus-visible,
      header .btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px rgba(224, 120, 90, 0.6);
      }
      /* Wordmark: a subtle, premium logo-mark tilt on hover. */
      header a:not(.chip):not(.btn) { transition: opacity 0.2s var(--ease); }
      header a:not(.chip):not(.btn):hover { opacity: 0.92; }
      header a:not(.chip):not(.btn) > span:first-child {
        transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
      }
      header a:not(.chip):not(.btn):hover > span:first-child {
        transform: rotate(-7deg);
        box-shadow: 0 10px 22px -10px rgba(224, 120, 90, 0.85);
      }

      /* ---- Hero: take over the block fade, orchestrate a staggered reveal ---- */
      .home-grid.rise { animation: none; }
      .home-copy > * { animation: hp-rise 0.62s cubic-bezier(.22,.61,.36,1) both; }
      .home-copy > *:nth-child(1) { animation-delay: 0.10s; }
      .home-copy > *:nth-child(2) { animation-delay: 0.18s; }
      .home-copy > *:nth-child(3) { animation-delay: 0.26s; }
      .home-copy > *:nth-child(4) { animation-delay: 0.34s; }
      .home-copy > *:nth-child(5) { animation-delay: 0.42s; }
      .home-copy > *:nth-child(6) { animation-delay: 0.50s; }

      .ops-panel { animation: hp-slide 0.7s cubic-bezier(.22,.61,.36,1) both; animation-delay: 0.16s; }
      .ops-panel .signal-row { animation: hp-rise 0.55s cubic-bezier(.22,.61,.36,1) both; }
      .ops-panel .signal-row:nth-child(1) { animation-delay: 0.34s; }
      .ops-panel .signal-row:nth-child(2) { animation-delay: 0.42s; }
      .ops-panel .signal-row:nth-child(3) { animation-delay: 0.50s; }
      .ops-panel .telemetry-strip { animation: hp-rise 0.55s cubic-bezier(.22,.61,.36,1) both; animation-delay: 0.58s; }

      /* ---- Metric tiles: lift on hover (entrance rides the hero stagger) ---- */
      .metric-tile {
        transition: transform 0.25s cubic-bezier(.22,.61,.36,1), border-color 0.25s ease, box-shadow 0.25s ease;
      }
      .metric-tile:hover {
        transform: translateY(-3px);
        border-color: rgba(224,120,90,.42);
        box-shadow: 0 14px 32px -16px rgba(0,0,0,.75);
      }

      /* ---- Habit matrix: staggered entrance (hover accent lives in IntakeView) ---- */
      .habit-card { animation: hp-rise 0.55s cubic-bezier(.22,.61,.36,1) both; }
      .habit-card:nth-child(1) { animation-delay: 0.06s; }
      .habit-card:nth-child(2) { animation-delay: 0.12s; }
      .habit-card:nth-child(3) { animation-delay: 0.18s; }
      .habit-card:nth-child(4) { animation-delay: 0.24s; }
      .habit-card:nth-child(5) { animation-delay: 0.30s; }
      .habit-card:nth-child(6) { animation-delay: 0.36s; }

      /* ---- Hero primary CTA: depth glow + a slow shine sweep ---- */
      .home-copy .btn-primary {
        position: relative; overflow: hidden;
        box-shadow: 0 12px 32px -12px rgba(224,120,90,.7);
      }
      .home-copy .btn-primary::after {
        content: ""; position: absolute; top: 0; left: -70%;
        width: 42%; height: 100%;
        background: linear-gradient(100deg, transparent, rgba(255,255,255,.32), transparent);
        transform: skewX(-18deg);
        animation: hp-shine 4.8s ease-in-out infinite;
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        header, header::after, .home-copy > *, .ops-panel, .ops-panel .signal-row,
        .ops-panel .telemetry-strip, .habit-card, .home-copy .btn-primary::after {
          animation: none !important;
        }
        .home-copy > *, .ops-panel, .habit-card { opacity: 1 !important; translate: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Branded splash; removed the instant Vue paints its first node. -->
    <div id="preboot" role="status" aria-label="Loading Unhook">
      <div class="pb-stage">
        <div class="pb-orbit" aria-hidden="true">
          <span class="pb-ring pb-ring-a"></span>
          <span class="pb-ring pb-ring-b"></span>
          <span class="pb-core">🪝</span>
        </div>
        <p class="pb-word">Un<b>hook</b></p>
        <p class="pb-sub">Turning the urge into an observed system</p>
        <div class="pb-bar" aria-hidden="true"><i></i></div>
      </div>
    </div>

    <script>
      // Dismiss the splash the moment the Vue app mounts (its first child
      // appears in #app). Fallback timeout guarantees we never trap a user
      // behind the loader if the bundle stalls.
      (function () {
        var pb = document.getElementById('preboot');
        var app = document.getElementById('app');
        if (!pb || !app) return;
        var done = false;
        function dismiss() {
          if (done) return;
          done = true;
          pb.classList.add('pb-out');
          setTimeout(function () { pb.parentNode && pb.remove(); }, 560);
        }
        if (app.children.length) return dismiss();
        var obs = new MutationObserver(function () {
          if (app.children.length) { obs.disconnect(); dismiss(); }
        });
        obs.observe(app, { childList: true });
        setTimeout(dismiss, 7000);
      })();
    </script>

    <!-- Register the service worker (installability + offline shell).
         Fails silently where unsupported or blocked; never affects the app. -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {})
        })
      }
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
